{% extends "base.html" %}

{% load static %}

{% block content %}

<!DOCTYPE html>

<html>
<head>
    <title>Ask Questions</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .container { max-width: 700px; margin: auto; }
        textarea, input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        .response {
            margin-top: 20px;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ask a Question</h2>

```
<form method="POST">
    {% csrf_token %}
    <input type="text" name="question" placeholder="Ask something..." required>
    <button type="submit">Ask</button>
</form>

{% if answer %}
    <div class="response">
        <strong>Answer:</strong>
        <p>{{ answer }}</p>
    </div>
{% endif %}
```

</div>

</body>
</html>



{% endblock %}
